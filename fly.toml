# Fly.io config — deploy with `fly launch` (reuses this file) or `fly deploy`.
#
# Game state is in-memory in a single Colyseus process, so this app must run
# as exactly ONE machine that never auto-stops mid-game:
#   fly scale count 1
app = "cactusonline"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true          # client auto-upgrades to wss:// on https pages
  auto_stop_machines = "off"  # stopping the machine would kill live games
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
